<!-- Info(#): Handbuch – Werkstoffe (Filter/Suche/Liste/Details) + optional Auswahlmodus -->

<section class="card">
  <div class="item-head">
    <h2 style="margin:0">Werkstoff-Handbuch</h2>
    <span id="hbMode" class="pill">Normal</span>
  </div>
  <p class="muted" style="margin-top:10px">
    Suche nach ID oder Name. Gruppenfilter links. Details rechts.
  </p>
</section>

<section class="card">
  <div class="split">
    <aside class="split-side">
      <div class="controlrow">
        <select id="groupFilter" class="control">
          <option value="all">Alle anzeigen</option>
        </select>
        <input id="q" class="control" placeholder="Suchen… z.B. 1.4301, C45, AlMg3.5" />
      </div>

      <div class="list" id="list"></div>

      <p class="muted hint">
        Hinweis: Wenn `data/materials.json` bei `file://` nicht lädt, nutze Live Server.
      </p>
    </aside>

    <section class="split-content">
      <div id="details" class="warn">Wähle links einen Werkstoff aus.</div>
    </section>
  </div>
</section>
