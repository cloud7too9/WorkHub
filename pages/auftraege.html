<!-- Info(#): UI für Aufträge + Sägestücke (Form/Liste) + Handbuch-Werkstoffwahl -->

<section class="card">
  <h2>Neuer Auftrag</h2>

  <form id="orderForm" class="form">
    <label class="field">
      <span>Titel *</span>
      <input id="title" type="text" maxlength="60" required placeholder="z.B. Alu Profile 40x20" />
    </label>

    <!-- Handbuch-Material -->
    <input id="materialId" type="hidden" />

    <div class="row">
      <label class="field" style="flex:1">
        <span>Material (optional)</span>
        <input id="material" type="text" maxlength="40" placeholder="z.B. EN AW-6060 oder per Handbuch wählen" />
      </label>
      <button class="btn ghost" type="button" id="pickMaterial" style="align-self:end">Werkstoff wählen</button>
    </div>

    <p id="materialHint" class="muted">Kein Werkstoff aus dem Handbuch gewählt.</p>

    <label class="field">
      <span>Notiz (optional)</span>
      <textarea id="note" rows="3" maxlength="240" placeholder="z.B. 3mm Toleranz, Kanten entgraten"></textarea>
    </label>

    <div class="row">
      <button class="btn primary" type="submit">Auftrag erstellen</button>
      <button class="btn ghost" type="button" id="seedReset">Seed laden</button>
      <button class="btn danger" type="button" id="clearAll">Alle löschen</button>
    </div>

    <p id="msg" class="msg" aria-live="polite"></p>
  </form>
</section>

<section class="card">
  <h2>Aktiv</h2>
  <ul id="activeList" class="list"></ul>
  <p id="emptyActive" class="muted">Keine aktiven Aufträge.</p>
</section>

<section class="card">
  <h2>Erledigt</h2>
  <ul id="doneList" class="list"></ul>
  <p id="emptyDone" class="muted">Noch nichts erledigt.</p>
</section>
