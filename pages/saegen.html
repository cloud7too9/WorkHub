<!-- Info(#): UI für 3 Sägen + Vorgang/Timer/Material -->

<section class="card">
  <h2>Sägen</h2>
  <p class="muted">
    Ablauf: Vorgang hinzufügen → Start → „1. fertig“ (Korrektur & Kalibrierung) → Auto zählt weiter.
    Material leer pausiert automatisch. Material eingeben → läuft weiter.
  </p>
</section>

<div id="sawWrap"></div>

<dialog id="opDialog">
  <div class="dialog-pad">
    <form method="dialog" class="form" id="opForm">
      <h2>Vorgang hinzufügen</h2>

      <input type="hidden" id="opSawId" />

      <label class="field">
        <span>Auftrag</span>
        <select id="opOrderSelect" required></select>
      </label>

      <label class="field">
        <span>Sägestück</span>
        <select id="opPieceSelect" required></select>
      </label>

      <div class="row">
        <label class="field" style="flex:1">
          <span>Insgesamt (Soll)</span>
          <input id="opTotal" type="number" inputmode="numeric" min="1" step="1" required />
        </label>
        <label class="field" style="flex:1">
          <span>Material-Länge (mm) (optional)</span>
          <input id="opBarLen" type="number" inputmode="numeric" min="0" step="0.1" placeholder="z.B. 3000" />
        </label>
      </div>

      <div class="row">
        <button class="btn primary" value="ok">Übernehmen</button>
        <button class="btn ghost" value="cancel">Abbrechen</button>
      </div>
    </form>
  </div>
</dialog>
